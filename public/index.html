<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>R-Localhost</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Roboto', 'sans-serif'] },
          colors: {
            md: {
              bg: '#141218',
              surface: '#211F26',
              surfaceHigh: '#2B2930',
              primary: '#A8C7FA',
              onPrimary: '#062E6F',
              text: '#E6E0E9',
              textMuted: '#CAC4D0',
              error: '#FFB4AB',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .md-transition { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    
    #toast {
      transition: transform 0.3s ease, opacity 0.3s ease;
      transform: translateY(100px);
      opacity: 0;
    }
    #toast.show {
      transform: translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body class="bg-md-bg text-md-text font-sans antialiased min-h-screen flex flex-col overflow-x-hidden">

  <!-- Android Top App Bar -->
  <header class="px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h1 class="text-[22px] font-normal tracking-wide">R-Localhost</h1>
    </div>
    <button class="w-12 h-12 rounded-full flex items-center justify-center md-transition active:bg-md-surfaceHigh">
      <span class="material-symbols-rounded text-md-text">settings</span>
    </button>
  </header>

  <!-- Master Tunnel Controller -->
  <div class="px-4 mt-2 mb-6">
    <div class="bg-md-surface rounded-[28px] p-5 flex items-center justify-between">
      <div>
        <h2 class="text-lg font-normal text-md-text">Master Routing</h2>
        <p class="text-sm text-md-textMuted mt-1" id="master-status-text">Checking status...</p>
      </div>
      
      <button id="master-toggle" class="w-14 h-8 rounded-full bg-md-surfaceHigh border-2 border-md-textMuted flex items-center p-1 md-transition relative" onclick="toggleMasterTunnel()">
        <div id="master-spinner" class="absolute inset-0 flex items-center justify-center hidden">
          <span class="material-symbols-rounded animate-spin text-[16px] text-md-primary">progress_activity</span>
        </div>
        <div id="master-toggle-thumb" class="w-5 h-5 rounded-full bg-md-textMuted md-transition translate-x-0"></div>
      </button>
    </div>
  </div>

  <!-- Segmented Tabs -->
  <div class="px-4 mb-6">
    <div class="flex bg-md-surfaceHigh rounded-full p-1">
      <button id="tab-workspace" class="flex-1 py-2 rounded-full bg-md-primary text-md-onPrimary font-medium text-sm md-transition" onclick="switchTab('workspace')">
        Workspace
      </button>
      <button id="tab-general" class="flex-1 py-2 rounded-full text-md-text font-medium text-sm md-transition" onclick="switchTab('general')">
        General
      </button>
    </div>
  </div>

  <main class="flex-1 relative w-full overflow-hidden">
    
    <!-- R-WORKSPACE VIEW -->
    <div id="view-workspace" class="absolute w-full px-4 md-transition transform translate-x-0 opacity-100">
      
      <!-- RCloud Card -->
      <div class="bg-md-surface rounded-[24px] p-5 mb-4">
        <div class="flex items-center gap-4 mb-5">
          <div class="w-10 h-10 rounded-full bg-md-surfaceHigh flex items-center justify-center">
            <span class="material-symbols-rounded text-md-primary">cloud</span>
          </div>
          <div>
            <h3 class="text-base font-medium">R-Cloud Storage</h3>
            <p class="text-sm text-md-textMuted" id="rcloud-status">Status: Unknown</p>
          </div>
        </div>
        <!-- Fully Wired Button -->
        <button id="rcloud-btn" onclick="toggleRCloud()" class="w-full py-2.5 rounded-full bg-md-surfaceHigh text-md-primary font-medium text-sm md-transition active:scale-[0.98]">
          Ignite Drive
        </button>
      </div>

      <!-- YourHost Card -->
      <div class="bg-md-surface rounded-[24px] p-5 mb-4">
        <div class="flex items-center gap-4 mb-5">
          <div class="w-10 h-10 rounded-full bg-md-surfaceHigh flex items-center justify-center">
            <span class="material-symbols-rounded text-md-primary">sports_esports</span>
          </div>
          <div>
            <h3 class="text-base font-medium">YourHost</h3>
            <p class="text-sm text-md-textMuted" id="mc-status">Bedrock Engine</p>
          </div>
        </div>
        <button id="mc-btn" class="w-full py-2.5 rounded-full bg-md-surfaceHigh text-md-primary font-medium text-sm md-transition active:scale-[0.98]">
          Initialize Server
        </button>
      </div>

    </div>

    <!-- GENERAL VIEW (Dynamic Proxy) -->
    <div id="view-general" class="absolute w-full px-4 md-transition transform translate-x-[100%] opacity-0 pointer-events-none">
      <div class="bg-md-surface rounded-[24px] p-5">
        <h2 class="text-base font-medium text-md-primary mb-4">Mount Subdomain</h2>
        <div class="flex flex-col gap-4 mb-6">
          <input type="text" id="proxy-name" placeholder="Name (e.g., api)" class="w-full bg-md-bg text-md-text border border-md-surfaceHigh rounded-xl px-4 py-3 focus:outline-none focus:border-md-primary md-transition">
          <input type="number" id="proxy-port" placeholder="Local Port (e.g., 5000)" class="w-full bg-md-bg text-md-text border border-md-surfaceHigh rounded-xl px-4 py-3 focus:outline-none focus:border-md-primary md-transition">
        </div>
        <button onclick="mountProxy()" id="mount-btn" class="w-full py-2.5 rounded-full bg-md-primary text-md-onPrimary font-medium text-sm md-transition active:scale-[0.98] flex items-center justify-center gap-2">
          <span class="material-symbols-rounded text-[18px]">add</span> Create Route
        </button>
      </div>

      <h3 class="text-sm font-medium text-md-textMuted mt-6 mb-3 px-2">Active Routes</h3>
      <div id="active-routes-list" class="flex flex-col gap-2">
        <!-- JS Populated -->
      </div>
    </div>

  </main>

  <!-- Android System Toast Notification -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-md-surfaceHigh text-md-text px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 z-50 pointer-events-none w-[90%] max-w-[350px]">
    <span id="toast-icon" class="material-symbols-rounded text-md-primary text-[20px]">info</span>
    <span id="toast-msg" class="text-sm font-medium">System message</span>
  </div>

  <script src="/app.js"></script>
</body>
</html>
