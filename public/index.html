<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>r-localhost | Master OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { gray: { 900: '#0a0a0c', 800: '#141418', 700: '#1f1f24' } },
          animation: { 'shimmer': 'shimmer 2.5s linear infinite' },
          keyframes: {
            shimmer: {
              '0%': { backgroundPosition: '200% center' },
              '100%': { backgroundPosition: '-200% center' }
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-black text-gray-100 h-screen w-screen overflow-hidden flex flex-col font-sans selection:bg-emerald-500/30">
  
  <!-- Dynamic Header -->
  <header class="px-6 py-6 border-b border-gray-800 bg-gray-900/80 backdrop-blur-xl flex items-center gap-4 z-10">
    <button id="btn-back" class="hidden text-gray-400 hover:text-white transition-colors active:scale-95">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div>
      <h1 id="header-title" class="text-2xl font-bold tracking-tight bg-gradient-to-r from-gray-100 to-gray-400 bg-clip-text text-transparent">r-localhost</h1>
      <p class="text-sm text-gray-500 mt-0.5">Master Daemon <span class="text-emerald-400 font-medium tracking-wide text-xs ml-2 uppercase animate-pulse">● Online</span></p>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto p-6 space-y-6 relative bg-gradient-to-b from-black via-gray-900/20 to-black">
    
    <!-- VIEW 1: HOME MENU -->
    <div id="view-home" class="space-y-4 transition-all duration-300">
      
      <!-- Yourhost App -->
      <div id="btn-nav-yourhost" class="group relative bg-gray-900 border border-gray-800 rounded-2xl p-5 shadow-lg active:scale-95 transition-all cursor-pointer overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-r from-blue-500/0 via-blue-500/5 to-blue-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000"></div>
        <div class="flex justify-between items-center relative z-10">
          <div class="flex items-center gap-4">
            <div class="h-12 w-12 bg-blue-500/10 text-blue-400 rounded-xl flex items-center justify-center border border-blue-500/20 shadow-[0_0_15px_rgba(59,130,246,0.15)]">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12h20M4.93 4.93l14.14 14.14M4.93 19.07L19.07 4.93"/></svg>
            </div>
            <div>
              <h2 class="text-lg font-semibold text-gray-100">Yourhost</h2>
              <p class="text-sm text-gray-500">Bedrock & DNS</p>
            </div>
          </div>
        </div>
      </div>

      <!-- RCloud App -->
      <div id="btn-nav-rcloud" class="group relative bg-gray-900 border border-gray-800 rounded-2xl p-5 shadow-lg active:scale-95 transition-all cursor-pointer overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-r from-purple-500/0 via-purple-500/5 to-purple-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000"></div>
        <div class="flex justify-between items-center relative z-10">
          <div class="flex items-center gap-4">
            <div class="h-12 w-12 bg-purple-500/10 text-purple-400 rounded-xl flex items-center justify-center border border-purple-500/20 shadow-[0_0_15px_rgba(168,85,247,0.15)]">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div>
              <h2 class="text-lg font-semibold text-gray-100">R-Cloud</h2>
              <p class="text-sm text-gray-500">Personal Drive</p>
            </div>
          </div>
        </div>
      </div>

      <!-- WAN Tunnel App -->
      <div id="btn-nav-tunnel" class="group relative bg-gray-900 border border-gray-800 rounded-2xl p-5 shadow-lg active:scale-95 transition-all cursor-pointer overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-r from-emerald-500/0 via-emerald-500/5 to-emerald-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000"></div>
        <div class="flex justify-between items-center relative z-10">
          <div class="flex items-center gap-4">
            <div class="h-12 w-12 bg-emerald-500/10 text-emerald-400 rounded-xl flex items-center justify-center border border-emerald-500/20 shadow-[0_0_15px_rgba(16,185,129,0.15)]">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 1 0 0-20zM2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            </div>
            <div>
              <h2 class="text-lg font-semibold text-gray-100">WAN Tunnel</h2>
              <p class="text-sm text-gray-500">Custom Port Proxy</p>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- VIEW 4: WAN TUNNEL CONFIG -->
    <div id="view-tunnel" class="hidden space-y-6 transition-all duration-300">
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-5 shadow-2xl relative overflow-hidden">
        <!-- Ambient Background Glow -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/5 rounded-full blur-3xl"></div>
        
        <div class="flex justify-between items-center mb-6 relative z-10">
          <h2 class="text-lg font-semibold text-gray-100">Global Proxy Engine</h2>
          <span id="tunnel-status-badge" class="px-3 py-1 rounded-full text-xs font-medium bg-red-500/10 text-red-500 border border-red-500/20 shadow-[0_0_10px_rgba(239,68,68,0.2)]">STOPPED</span>
        </div>

        <div class="space-y-4 relative z-10">
          <!-- Device Mode Toggle -->
          <div class="flex bg-gray-800 rounded-xl p-1 border border-gray-700">
            <button id="mode-device" class="flex-1 py-2 text-sm font-semibold rounded-lg bg-gray-700 text-white shadow transition-all">Device (Local)</button>
            <button id="mode-custom" class="flex-1 py-2 text-sm font-semibold rounded-lg text-gray-400 hover:text-white transition-all">Custom LAN</button>
          </div>

          <!-- Dynamic Inputs -->
          <input type="text" id="tunnel-custom-ip" placeholder="Target LAN IP (e.g. 192.168.1.5)" class="hidden w-full bg-black/50 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 transition-colors placeholder-gray-600">
          <input type="number" id="tunnel-port" placeholder="Port Number (e.g. 8080)" class="w-full bg-black/50 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 transition-colors placeholder-gray-600">
          
          <div class="flex gap-3 pt-2">
            <!-- SHIMMER BUTTON -->
            <button id="btn-tunnel-start" class="flex-1 bg-[linear-gradient(110deg,#10b981,45%,#34d399,55%,#10b981)] bg-[length:200%_100%] animate-shimmer text-black font-bold py-3 rounded-xl active:scale-95 transition-transform shadow-[0_0_20px_rgba(16,185,129,0.3)]">
              Ignite Tunnel
            </button>
            <button id="btn-tunnel-stop" class="flex-1 bg-black text-gray-300 font-semibold py-3 rounded-xl active:scale-95 transition-transform border border-gray-700 hover:bg-gray-800">Kill Process</button>
          </div>

          <!-- Link Output -->
          <div id="tunnel-link-container" class="hidden pt-4 mt-2 border-t border-gray-800 flex flex-col items-center justify-center">
            <p class="text-xs text-gray-500 mb-1">Global Active Link</p>
            <a id="tunnel-public-url" href="#" target="_blank" class="text-emerald-400 font-mono text-sm hover:text-emerald-300 transition-colors">Establishing routing...</a>
          </div>
        </div>
      </div>
    </div>
    
    <!-- (Your existing YourHost and RCloud View HTML goes here, unedited except for adapting to the new glow style if you want) -->
    
  </main>
  
  <script src="/app.js"></script>
</body>
</html>
